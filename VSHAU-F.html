<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body bgcolor="lightgrey">
    
    <form action="/action" bgcolor="#82CAFF">
        <header>
            <H1 ALIGN="CENTER"> TRF- APPLICATION FORM</H1>
        </header>
        <hr>


        <div><label for="name">ENTER YOUR NAME HERE:
            <br>
                <input type="text" id="name" name="name" placeholder="ENTER YOUR NAME">
            </label>
        </div>
        <br>

        <div><label for="Y">ENTER YOUR YEAR OF GRADUATION:
            <br>
                <input type="number" id="Y" name="YEAR" placeholder="ENTER YEAR">
            </label>
        </div>
        <br>

        SPECIFY YOUR GENDER:
        <div><input type="radio" id="male" value="male" name="gender">
            <label for="male">MALE</label></div>
        <div><input type="radio" id="female" value="female" name="gender">
            <label for="female">FEMALE</label></div>
<br>
        CHOOSE YOUR SUBJECTS:
        <div><label for="sub">ENGLISH
            <input type="checkbox" value="eng" id="eng" name="sub">
        </label></div>
        <div><label for="sub">MATHS
            <input type="checkbox" value="maths" id="maths" name="sub">
        </label></div>
        <div><label for="sub">SCIENCE
            <input type="checkbox" value="sci" id="sci" name="sub">
        </label></div>
<br>

        <div>
            <label>
                SELECT DOMAIN YOU WANT TO CHOOSE:
                <br>
                <select name="Domain" id="D">
                    <option value="MB">MULTI-BATCH</option>
                    <option value="NB">NAVY BATCH</option>
                    <option value="AB">ARMY BATCH</option>
                    <option value="AFB">AIR FORCE BATCH</option>
                    <option value="NDB">NDA BATCH</option>
                </select>
            </label>
        </div>
        <br>

        <div>
            <label for="num">ENTER YOUR PHONE NUMBER:
                <br>
                <input type="number" placeholder="Enter your mobile number" name="Phone" id="num">
            </label>
        </div>
        <br>

        <div>
            <label for="email">ENTER YOUR EMAIL:
                <br>
                <input type="email" placeholder="Enter your email id" name="email" id="email">
            </label>
        </div>
        <br>

        <div>
            <label>TELL US ABOUT YOURSELF:
                <br>
                <textarea name="about" cols="30" rows="10">

                </textarea>
            </label>
        </div>
<br>
        <button type="reset">
            RESET THE FORM
        </button>  
        <button type="submit">
            <b>CONFIRM AND SUBMIT</b>
        </button>

            <br>
            <br>
       
            
            <a href ="trf.html">
                <button type="button">CLICK HERE TO GO BACK</button>
            </a>
       
        





    </form>
</body>

</html>
